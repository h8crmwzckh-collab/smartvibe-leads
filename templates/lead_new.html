{% extends "base.html" %}
{% block title %}New Lead — SmartVibe{% endblock %}

{% block topbar_left %}
<a href="/leads" class="text-slate-500 hover:text-white transition-colors text-sm">Leads</a>
<span class="text-slate-600">/</span>
<span class="text-sm text-white">New Lead</span>
{% endblock %}

{% block content %}
<div class="px-8 py-6 max-w-2xl mx-auto">
  <div class="card rounded-xl p-6">
    <h2 class="text-base font-semibold text-white mb-6">Add Lead Manually</h2>
    <form action="/leads/new" method="POST" class="space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-xs text-slate-500 mb-1.5">Business Name <span class="text-red-400">*</span></label>
          <input type="text" name="name" required class="input-field" placeholder="ABC Plumbing Co." autofocus />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Owner Name</label>
          <input type="text" name="owner_name" class="input-field" placeholder="John Smith" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Business Type</label>
          <input type="text" name="business_type" class="input-field" placeholder="plumber, electrician…" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Phone</label>
          <input type="text" name="phone" class="input-field" placeholder="(719) 555-0100" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Email</label>
          <input type="email" name="email" class="input-field" placeholder="owner@business.com" />
        </div>
        <div class="col-span-2">
          <label class="block text-xs text-slate-500 mb-1.5">Address</label>
          <input type="text" name="address" class="input-field" placeholder="123 Main St" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">City</label>
          <input type="text" name="city" class="input-field" placeholder="Colorado Springs" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1.5">Website</label>
          <input type="text" name="website" class="input-field" placeholder="Leave blank if none" />
        </div>
        <div class="col-span-2">
          <label class="block text-xs text-slate-500 mb-1.5">Notes</label>
          <textarea name="notes" rows="3" class="input-field resize-none" placeholder="Optional notes…"></textarea>
        </div>
      </div>
      <div class="flex items-center gap-3 pt-2">
        <button type="submit" class="btn-primary">Add Lead</button>
        <a href="/leads" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
