<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartVibe Leads{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
          },
          fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','Inter','Segoe UI','sans-serif'] },
        }
      }
    }
  </script>
  <style>
    body { background: #0d0d12; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    .card { background: #13131a; border: 1px solid #1e2130; border-radius: 0.75rem; }
    .sidebar-link { display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem; border-radius:0.5rem; font-size:0.875rem; font-weight:500; color:#94a3b8; transition:all .15s; text-decoration:none; }
    .sidebar-link:hover { color:#fff; background:rgba(255,255,255,.05); }
    .sidebar-link.active { color:#fff; background:rgba(255,255,255,.1); }
    .input-field { width:100%; background:#1a1a24; border:1px solid #2a2a3a; border-radius:0.5rem; padding:0.5rem 0.75rem; font-size:0.875rem; color:#fff; outline:none; transition:border-color .15s; }
    .input-field::placeholder { color:#64748b; }
    .input-field:focus { border-color:#6366f1; }
    .badge-hot { display:inline-flex; align-items:center; gap:0.25rem; padding:0.125rem 0.5rem; border-radius:9999px; font-size:0.75rem; font-weight:600; background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.2); }
    .badge-warm { display:inline-flex; align-items:center; gap:0.25rem; padding:0.125rem 0.5rem; border-radius:9999px; font-size:0.75rem; font-weight:600; background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
    .badge-cold { display:inline-flex; align-items:center; gap:0.25rem; padding:0.125rem 0.5rem; border-radius:9999px; font-size:0.75rem; font-weight:600; background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.2); }
    .btn-primary { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background:#4f46e5; color:#fff; font-size:0.875rem; font-weight:600; border-radius:0.5rem; transition:background .15s; border:none; cursor:pointer; text-decoration:none; }
    .btn-primary:hover { background:#4338ca; }
    .btn-ghost { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background:rgba(255,255,255,.05); color:#cbd5e1; font-size:0.875rem; font-weight:500; border-radius:0.5rem; transition:background .15s; border:1px solid rgba(255,255,255,.1); cursor:pointer; text-decoration:none; }
    .btn-ghost:hover { background:rgba(255,255,255,.1); }
    .stat-card { background:#13131a; border:1px solid #1e2130; border-radius:0.75rem; padding:1.25rem; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    select.input-field { appearance:none; cursor:pointer; }
  </style>
</head>
<body class="font-sans text-white antialiased">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-60 flex-shrink-0 flex flex-col border-r border-white/5" style="background:#0a0a0f">
    <div class="px-5 py-5 border-b border-white/5">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white tracking-tight">SmartVibe</div>
          <div class="text-xs text-slate-500">Leads</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <p class="px-3 py-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wider">Workspace</p>
      <a href="/" class="sidebar-link {% if request.path == '/' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/></svg>
        Dashboard
      </a>
      <a href="/leads" class="sidebar-link {% if '/leads' in request.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
        Leads
        <span id="nav-total" class="ml-auto text-xs bg-white/10 text-slate-400 px-1.5 py-0.5 rounded-full"></span>
      </a>
      <a href="/call-queue" class="sidebar-link {% if 'call-queue' in request.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        Call Queue
        <span id="nav-calls" class="ml-auto text-xs bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded-full hidden"></span>
      </a>
      <a href="/scraper" class="sidebar-link {% if 'scraper' in request.path %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        Scraper
      </a>

      <div class="pt-4">
        <p class="px-3 py-1.5 text-xs font-semibold text-slate-600 uppercase tracking-wider">Quick Filters</p>
        <a href="/leads?priority=Hot" class="sidebar-link">
          <span class="w-2 h-2 rounded-full bg-red-500"></span> Hot Leads
        </a>
        <a href="/leads?status=new" class="sidebar-link">
          <span class="w-2 h-2 rounded-full bg-slate-500"></span> Not Contacted
        </a>
        <a href="/leads?status=postcard_sent" class="sidebar-link">
          <span class="w-2 h-2 rounded-full bg-blue-500"></span> Postcard Sent
        </a>
        <a href="/leads?status=converted" class="sidebar-link">
          <span class="w-2 h-2 rounded-full bg-green-500"></span> Converted
        </a>
      </div>
    </nav>

    <div class="px-3 py-4 border-t border-white/5">
      <a href="/leads/new" class="btn-primary w-full justify-center text-xs">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        Add Lead
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Topbar -->
    <header class="flex-shrink-0 h-14 flex items-center justify-between px-6 border-b border-white/5" style="background:#0a0a0f">
      <div class="flex items-center gap-3">
        {% block topbar_left %}{% endblock %}
      </div>
      <div class="flex items-center gap-3">
        <!-- Notification bell -->
        <button onclick="toggleNotifications()" class="relative p-2 rounded-lg hover:bg-white/5 text-slate-400 hover:text-white transition-colors" id="notif-btn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="notif-dot" class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full hidden pulse-dot"></span>
        </button>
        <a href="/leads/new" class="btn-primary text-xs py-1.5 px-3">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          New Lead
        </a>
      </div>
    </header>

    <!-- Notification panel -->
    <div id="notif-panel" class="hidden absolute right-4 top-16 w-80 z-50 card rounded-xl shadow-2xl border border-white/10 overflow-hidden">
      <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between">
        <span class="text-sm font-semibold text-white">Notifications</span>
        <button onclick="markRead()" class="text-xs text-slate-500 hover:text-white">Mark all read</button>
      </div>
      <div id="notif-list" class="max-h-80 overflow-y-auto divide-y divide-white/5">
        <div class="px-4 py-6 text-center text-sm text-slate-500">No new notifications</div>
      </div>
    </div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script>
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    const total = document.getElementById('nav-total');
    const calls = document.getElementById('nav-calls');
    if (total) total.textContent = s.total;
    if (calls && s.call_ready > 0) {
      calls.textContent = s.call_ready;
      calls.classList.remove('hidden');
    }
  } catch(e) {}
}

async function loadNotifications() {
  try {
    const r = await fetch('/api/notifications');
    const data = await r.json();
    const dot = document.getElementById('notif-dot');
    const list = document.getElementById('notif-list');
    if (data.length > 0) {
      dot.classList.remove('hidden');
      list.innerHTML = data.map(n => `
        <div class="px-4 py-3 hover:bg-white/5 transition-colors">
          <div class="flex items-start gap-2">
            <div class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${n.type==='hot'?'bg-red-500':n.type==='success'?'bg-green-500':'bg-blue-500'}"></div>
            <div>
              <p class="text-sm text-slate-200">${n.message}</p>
              ${n.lead_name ? `<a href="/leads/${n.lead_id}" class="text-xs text-brand-400 hover:underline">${n.lead_name}</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }
  } catch(e) {}
}

function toggleNotifications() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('hidden');
}

async function markRead() {
  await fetch('/api/notifications/read', {method:'POST'});
  document.getElementById('notif-dot').classList.add('hidden');
  document.getElementById('notif-list').innerHTML = '<div class="px-4 py-6 text-center text-sm text-slate-500">No new notifications</div>';
  document.getElementById('notif-panel').classList.add('hidden');
}

document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  const btn = document.getElementById('notif-btn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) panel.classList.add('hidden');
});

loadStats();
loadNotifications();
setInterval(loadNotifications, 30000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
